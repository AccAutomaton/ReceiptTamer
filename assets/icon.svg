<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- White background with rounded corners -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="#FFFFFF"/>

  <!-- Minimalist receipt shape -->
  <path d="
    M 160 100
    L 352 100
    L 352 380
    L 320 360
    L 288 380
    L 256 360
    L 224 380
    L 192 360
    L 160 380
    Z
  " fill="none" stroke="#006874" stroke-width="16" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Receipt top decorative line -->
  <line x1="200" y1="160" x2="312" y2="160" stroke="#006874" stroke-width="12" stroke-linecap="round"/>

  <!-- Receipt text lines - minimalist representation -->
  <line x1="200" y1="210" x2="300" y2="210" stroke="#006874" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <line x1="200" y1="245" x2="280" y2="245" stroke="#006874" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  <line x1="200" y1="280" x2="260" y2="280" stroke="#006874" stroke-width="8" stroke-linecap="round" opacity="0.5"/>

  <!-- Total amount line - slightly emphasized -->
  <line x1="200" y1="330" x2="312" y2="330" stroke="#006874" stroke-width="10" stroke-linecap="round"/>
</svg>