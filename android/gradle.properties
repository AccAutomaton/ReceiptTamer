org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Disable Kotlin incremental compilation to fix cross-drive cache issues
kotlin.incremental=false
kotlin.incremental.js=false
kotlin.incremental.multiplatform=false
kotlin.caching.enabled=false

# Disable Gradle caching to avoid cross-drive issues
org.gradle.caching=false

# MNN LLM runtime is packaged only for arm64-v8a. Keep default Android builds
# arm64-only so x86_64 AVDs that expose arm64-v8a can run through ARM64
# translation when installed manually.
target-platform=android-arm64
mnn.arm64Only=true
