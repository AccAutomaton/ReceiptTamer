name: receipt_tamer
description: "ReceiptTamer - A Receipt Management App"
publish_to: 'none'

version: 0.2.0+20260327

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.6
  font_awesome_flutter: ^10.8.0

  # State Management
  flutter_riverpod: ^3.2.1

  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  sqflite_common_ffi: ^2.3.0

  # Image Picker
  image_picker: ^1.0.5
  file_picker: ^8.0.0

  # PDF Processing
  syncfusion_flutter_pdf: ^32.2.8
  syncfusion_flutter_pdfviewer: ^32.2.8

  # Routing
  go_router: ^17.1.0

  # Utils
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  intl: ^0.20.2
  uuid: ^4.2.1
  path_provider: ^2.1.1
  share_plus: ^12.0.1
  excel: ^4.0.1
  image: ^4.1.3
  easy_refresh: ^3.4.0

  # Network
  http: ^1.2.0
  connectivity_plus: ^6.0.0

  # App Info
  package_info_plus: ^8.0.0

  # Preferences
  shared_preferences: ^2.3.0

  # File Opening
  open_file: ^3.5.0

  # Archive (zip compression)
  archive: ^3.6.1

  # URL Launcher
  url_launcher: ^6.3.0

  # Share Handling
  share_handler: ^0.0.19
  receive_sharing_intent: ^1.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  json_serializable: ^6.9.0
  build_runner: ^2.12.2
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon_foreground.png"

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/models/qwen3.5-0.8b.mnn/